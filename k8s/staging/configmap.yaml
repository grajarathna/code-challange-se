apiVersion: v1
kind: ConfigMap
metadata:
  name: store-config
  namespace: staging
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://staging-postgres:5432/store"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_USE_SQL_COMMENTS: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_BATCH_FETCH_SIZE: "20"
  LOGGING_LEVEL_COM_EXAMPLE_STORE: "INFO"
  APP_SECURITY_CORS_ORIGIN: "https://staging.store.example.com"
