apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: store-secrets
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: store-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: store/prod/db
        property: url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: store/prod/db
        property: username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: store/prod/db
        property: password
